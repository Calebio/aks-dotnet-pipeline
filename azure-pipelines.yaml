trigger:
  branches:
    include:
      - main

variables:
  imageName: 'weatherapi'
  tag: '$(Build.BuildId)'
  dockerRegistryServiceConnection: 'acr-connection'
  acrLoginServer: 'calebaksacr.azurecr.io'
  k8sServiceConnection: 'aks-connection'

stages:
- stage: Build
  displayName: Build, Test & Push
  jobs:
  - job: BuildTestPush
    pool:
      vmImage: 'ubuntu-22.04'
    steps:
    - task: UseDotNet@2
      displayName: 'Install .NET 10 SDK'
      inputs:
        version: '10.0.x'

    - script: |
        curl -sSL https://dot.net/v1/dotnet-install.sh -o dotnet-install.sh
        chmod +x dotnet-install.sh
        ./dotnet-install.sh --channel 8.0 --runtime aspnetcore --install-dir /opt/hostedtoolcache/dotnet
      displayName: 'Install ASP.NET Core 8 runtime'

    - script: dotnet restore AksDotnetPipeline.slnx
      displayName: 'Restore'

    - script: dotnet build AksDotnetPipeline.slnx --configuration Release --no-restore
      displayName: 'Build'

    - script: dotnet test AksDotnetPipeline.slnx --configuration Release --no-build --logger trx
      displayName: 'Test'

    - task: PublishTestResults@2
      condition: succeededOrFailed()
      inputs:
        testResultsFormat: 'VSTest'
        testResultsFiles: '**/*.trx'

    - task: Docker@2
      displayName: 'Build & Push image'
      inputs:
        containerRegistry: '$(dockerRegistryServiceConnection)'
        repository: '$(imageName)'
        command: 'buildAndPush'
        Dockerfile: 'Dockerfile'
        tags: |
          $(tag)
          latest

- stage: Deploy
  displayName: Deploy to AKS
  dependsOn: Build
  condition: succeeded()
  jobs:
  - deployment: DeployToAKS
    pool:
      vmImage: 'ubuntu-latest'
    environment: 'aks-prod'
    strategy:
      runOnce:
        deploy:
          steps:
          - checkout: self
          - script: |
              sed -i "s|__ACR_LOGIN_SERVER__|$(acrLoginServer)|g" k8s/deployment.yaml
              sed -i "s|__IMAGE_TAG__|$(tag)|g" k8s/deployment.yaml
            displayName: 'Substitute image placeholders'
            workingDirectory: '$(Build.SourcesDirectory)'
          - task: KubernetesManifest@1
            displayName: 'Deploy manifests'
            inputs:
              action: 'deploy'
              connectionType: 'kubernetesServiceConnection'
              kubernetesServiceConnection: '$(k8sServiceConnection)'
              manifests: |
                $(Build.SourcesDirectory)/k8s/deployment.yaml
                $(Build.SourcesDirectory)/k8s/service.yaml